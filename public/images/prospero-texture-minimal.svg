<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#2E6F66" stroke-width="1.5" stroke-opacity="0.25">
    
    <!-- The Golden Spiral (approximate with arcs) -->
    <!-- Start near center (500,500) -->
    <path d="M 500,500 
             A 20,20 0 0 1 480,480 
             A 20,20 0 0 1 500,460 
             A 40,40 0 0 1 540,500 
             A 60,60 0 0 1 480,560 
             A 100,100 0 0 1 380,460 
             A 160,160 0 0 1 540,300 
             A 260,260 0 0 1 800,560 
             A 420,420 0 0 1 380,980 
             A 680,680 0 0 1 -300,300" />
             
    <!-- Secondary overlapping spiral for the "network" feel -->
    <path d="M 500,500 
             A 20,20 0 0 0 520,520 
             A 20,20 0 0 0 500,540 
             A 40,40 0 0 0 460,500 
             A 60,60 0 0 0 520,440 
             A 100,100 0 0 0 620,540 
             A 160,160 0 0 0 460,700 
             A 260,260 0 0 0 200,440 
             A 420,420 0 0 0 620,20 
             A 680,680 0 0 0 1300,700" stroke-opacity="0.15" />

    <!-- Network lines across the curves -->
    <!-- Connect key points of the Fibonacci sequence -->
    <g stroke-opacity="0.15" stroke-dasharray="4 6">
        <line x1="480" y1="480" x2="520" y2="520" />
        <line x1="500" y1="460" x2="500" y2="540" />
        <line x1="540" y1="500" x2="460" y2="500" />
        <line x1="480" y1="560" x2="520" y2="440" />
        <line x1="380" y1="460" x2="620" y2="540" />
        <line x1="540" y1="300" x2="460" y2="700" />
        <line x1="800" y1="560" x2="200" y2="440" />
        <line x1="380" y1="980" x2="620" y2="20" />
    </g>

    <!-- AI Network Nodes (Points at intersections) -->
    <g fill="#2E6F66" stroke="none">
        <circle cx="500" cy="500" r="3.5" fill-opacity="0.4" />
        
        <circle cx="480" cy="480" r="2" fill-opacity="0.4" />
        <circle cx="500" cy="460" r="2.5" fill-opacity="0.4" />
        <circle cx="540" cy="500" r="3" fill-opacity="0.4" />
        <circle cx="480" cy="560" r="3.5" fill-opacity="0.4" />
        
        <circle cx="380" cy="460" r="4.5" fill-opacity="0.4" />
        <circle cx="540" cy="300" r="5" fill-opacity="0.4" />
        <circle cx="800" cy="560" r="6" fill-opacity="0.4" />
        <circle cx="380" cy="980" r="7" fill-opacity="0.4" />

        <!-- Nodes on secondary spiral -->
        <circle cx="520" cy="520" r="2" fill-opacity="0.3" />
        <circle cx="500" cy="540" r="2.5" fill-opacity="0.3" />
        <circle cx="460" cy="500" r="3" fill-opacity="0.3" />
        <circle cx="520" cy="440" r="3.5" fill-opacity="0.3" />
        <circle cx="620" cy="540" r="4.5" fill-opacity="0.3" />
        <circle cx="460" cy="700" r="5" fill-opacity="0.3" />
        <circle cx="200" cy="440" r="6" fill-opacity="0.3" />
        <circle cx="620" cy="20" r="7" fill-opacity="0.3" />
    </g>
  </g>
</svg>
